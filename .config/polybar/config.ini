[global/wm]
margin-bottom = 0
margin-top = 0
include-file = modules.ini
include-file = colors.ini

[bar/example]
width = 90%
height = 26pt
radius = 4

offset-x = 5%

background = ${colors.black}
foreground = ${colors.white}

border-size = 4pt
border-color = ${colors.transparent}

padding = 2

module-margin = 0

font-0 = "JetBrainsMono:style=Bold:pixelsize=9;3"
font-1 = "Noto Sans JP;3"
font-2 = "Font Awesome 6 Free Solid:size=10;3"
font-3 = "Material Design Icons Desktop:size=11;3"
font-4 = "Material Design Icons Desktop:size=15;4"
; Glyphs
font-5 = "MesloLGS NF:style=Regular:pixelsize=17;4"
font-6 = "Symbols Only:style=Regular:size=15;4"

modules-left = bl cpu br sep bl memory br sep bl filesystem br
modules-center = xworkspaces
modules-right = pulseaudio xkeyboard network date

separator = 
dim-value = 1.0

wm-restack = bspwm
enable-icp = true

cursor-click = pointer
cursor-scroll = 

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
