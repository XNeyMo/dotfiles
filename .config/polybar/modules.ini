[module/bl]
type = custom/text
label = "%{T5}ŅéČ%{T-}"
label-foreground = ${colors.gray}
label-background = ${colors.black}

[module/br]
type = custom/text
label = "%{T5}Ņé┤%{T-}"
label-foreground = ${colors.gray}
label-background = ${colors.black}

[module/sep]
type = custom/text
label = " "
label-foreground = ${colors.grey}

[module/dots]
type = custom/text
label = " ¾░ćÖ "
label-font = 3
label-foreground = ${emilia.blue-gray}

[module/battery]
type = internal/battery
full-at = 99
battery = ${system.sys_battery}
adapter = ${system.sys_adapter}
poll-interval = 2
time-format = %H:%M

format-charging = <animation-charging><label-charging>
format-charging-prefix = "ŅéĘ "
format-charging-prefix-font = 2
format-charging-prefix-foreground = ${colors.red}
label-charging = " %percentage%%"

format-discharging = <ramp-capacity><label-discharging>
label-discharging = " %percentage%%"

format-full = <label-full>
format-full-prefix = "’ēĆ "
format-full-prefix-font = 2
format-full-prefix-foreground = ${colors.green}
label-full = "%percentage%%"

ramp-capacity-0 = ’ēä
ramp-capacity-1 = ’ēā
ramp-capacity-2 = ’ēé
ramp-capacity-3 = ’ēü
ramp-capacity-4 = ’ēĆ
ramp-capacity-foreground = ${colors.yellow}
ramp-capacity-font = 2

animation-charging-0 = ’ēä
animation-charging-1 = ’ēā
animation-charging-2 = ’ēé
animation-charging-3 = ’ēü
animation-charging-4 = ’ēĆ
animation-charging-foreground = ${colors.green}
animation-charging-font = 2
animation-charging-framerate = 700

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.gray}
label-active-underline= ${colors.blue}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.red}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.gray}
label-empty-padding = 1

[module/filesystem]
type = internal/fs

mount-0 = /
interval = 60
fixed-values = true

format-mounted = <label-mounted>
format-mounted-prefix = "’łĆ "
format-mounted-prefix-font = 2
format-mounted-prefix-background = ${colors.gray}
format-mounted-prefix-foreground = ${colors.yellow}

format-unmounted = <label-unmounted>
format-unmounted-prefix-font = 2
format-unmounted-prefix = "’łĆ "

label-mounted = %used%
label-mounted-background = ${colors.gray}

label-unmounted = %mountpoint%: not mounted

[module/pulseaudio]
type = internal/pulseaudio

;;sink = alsa_output.pci-0000_00_1b.0.analog-stereo
use-ui-max = true
interval = 5

format-volume = <label-volume>
format-volume-prefix = "’Ć©"
format-volume-prefix-font = 2
format-volume-background = ${colors.grey}
format-volume-foreground = ${colors.blue}

label-volume = " %percentage% "
label-volume-background = ${colors.grey}
label-volume-foreground = ${colors.white}

format-muted = <label-muted>
format-muted-prefix = ’Ü®
format-muted-prefix-font = 2
format-muted-foreground = ${colors.blue}
format-muted-background = ${colors.grey}
label-muted = " Muted "
label-muted-foreground = ${colors.red}
label-muted-background = ${colors.grey}

ramp-volume-0 = ’Ć”
ramp-volume-1 = ’Ć¦
ramp-volume-2 = ’Ć¦
ramp-volume-3 = ’Ć©
ramp-volume-4 = ’Ć©

click-right = OpenApps --soundcontrol

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.blue}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.black}
label-indicator-background = ${colors.yellow}

[module/memory]
type = internal/memory

interval = 3

format = <label>
format-prefix = "’öĖ "
format-prefix-font = 2
format-prefix-background = ${colors.grey}
format-prefix-foreground = ${colors.blue}

label = %used%
label-background = ${colors.grey}

[module/cpu]
type = internal/cpu

interval = 0.5

format = <label>
format-prefix = "’ŗø "
format-prefix-font = 2
format-prefix-background = ${colors.grey}
format-prefix-foreground = ${colors.red}

label = "%percentage%%"
label-background = ${emilia.mb}

[module/date]
type = internal/date
interval = 1

time = %I:%M %P
format-background = ${colors.gray}
format-foreground = ${colors.white}

format = <label>
format-prefix = 
format-prefix-font = 2
format-prefix-background = ${colors.gray}
format-prefix-foreground = ${colors.blue}

label = %time%

# to-do
[module/network]
type = internal/network
interface = ${system.sys_network_interface}

interval = 3.0
accumulate-stats = true
unknown-as-up = true

format-connected = <label-connected>
format-connected-prefix = "’ć½ "
format-connected-prefix-font = 2
format-connected-background = ${colors.gray}
format-connected-foreground = ${colors.green}

speed-unit = ""
label-connected = "%netspeed%"
label-connected-background = ${colors.grey}
label-connected-foreground = ${colors.yellow}

format-disconnected = <label-disconnected>
format-disconnected-prefix = "’ć½ "
format-disconnected-prefix-font = 2
format-disconnected-prefix-background = ${colors.gray}
format-disconnected-foreground = ${colors.red}

label-disconnected = "Offline"
label-disconnected-background = ${colors.gray}
label-disconnected-foreground = ${colors.red}
