[module/bl]
type = custom/text
label = "%{T5}Óā∂%{T-}"
label-foreground = ${colors.interground}
label-background = ${colors.background}

[module/br]
type = custom/text
label = "%{T5}Óāī%{T-}"
label-foreground = ${colors.interground}
label-background = ${colors.background}

[module/sep]
type = custom/text
label = " "
label-foreground = ${colors.background}

;====================================================================

[module/bspwm]
type = internal/bspwm

enable-click = true
enable-scroll = true
reverse-scroll = true
pin-workspaces = true
occupied-scroll = false

format = <label-state>
format-font = 3

label-focused = %name%
label-focused-background = ${colors.interground}
label-focused-foreground = ${colors.magenta}
label-focused-padding = 1

label-occupied = %name%
label-occupied-background = ${colors.interground}
label-occupied-foreground = ${colors.cyan}
label-occupied-padding = 1

label-urgent = %icon%
label-urgent-padding = 0

label-empty = %name%
label-empty-background = ${colors.interground}
label-empty-foreground = ${colors.gray}
label-empty-padding = 1

;====================================================================

[module/memory]
type = internal/memory

interval = 2

format-prefix = "ÓČ¶   "
format-prefit-background = ${colors.interground}
format-prefix-foreground = ${colors.cyan}

label = %used%
label-background = ${colors.interground}

[module/cpu]
type = internal/cpu

interval = 2

format-prefix = "Ôíľ   "
format-prefix-background = ${colors.interground}
format-prefix-foreground = ${colors.red}

label = %percentage%%
label-background = ${colors.interground}

[module/pulseaudio]
type = internal/pulseaudio

;;sink = alsa_output.pci-0000_00_1b.0.analog-stereo
use-ui-max = true
interval = 5

format-volume = <label-volume>
format-volume-prefix = "ÔÄ®"
format-volume-prefix-font = 2
format-volume-background = ${colors.interground}
format-volume-foreground = ${colors.magenta}

label-volume = " %percentage% "
label-volume-background = ${colors.interground}
label-volume-foreground = ${colors.foreground}

format-muted = <label-muted>
format-muted-prefix = ÔÄ¶
format-muted-prefix-font = 2
format-muted-foreground = ${colors.magenta}
format-muted-background = ${colors.interground}
label-muted = " Muted "
label-muted-foreground = ${colors.red}
label-muted-background = ${colors.interground}

ramp-volume-0 = ÔÄ¶
ramp-volume-1 = ÔÄß
ramp-volume-2 = ÔÄß
ramp-volume-3 = ÔÄ®
ramp-volume-4 = ÔÄ®

[module/date]
type = internal/date

interval = 1.0

time = %I:%M %P
format-background = ${colors.interground}
format-foreground = ${colors.foreground}
;;date-alt = " %A, %d %B %Y"

format = <label>
format-prefix = 
format-prefix-font = 2
format-prefix-background = ${colors.interground}
format-prefix-foreground = ${colors.blue}
